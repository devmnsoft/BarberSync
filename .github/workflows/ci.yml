name: BarberSync 2.0 CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore Backend.sln
      - name: Build
        run: dotnet build Backend.sln --configuration Release --no-restore
      - name: Test + coverage
        run: dotnet test Backend.sln --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

  mobile-totem:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [MobileApp, Totem]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            MobileApp/package-lock.json
            Totem/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Unit tests
        run: npm test --if-present -- --ci

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install playwright
        run: |
          npm --prefix tests/e2e ci
          npx --prefix tests/e2e playwright install --with-deps chromium
      - name: Run E2E smoke
        run: npm --prefix tests/e2e test
