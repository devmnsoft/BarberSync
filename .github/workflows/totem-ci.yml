name: Totem CI
on:
  push:
    paths:
      - 'Totem/**'
      - '.github/workflows/totem-ci.yml'
  pull_request:
    paths:
      - 'Totem/**'

jobs:
  totem:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Totem
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - run: npm test --if-present
