services:
  postgres:
    image: postgres:16
    container_name: barbersync-postgres
    env_file: .env
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ScriptsSQL/barber_full_database_postgresql.sql:/docker-entrypoint-initdb.d/01_barber_full_database_postgresql.sql
  seq:
    image: datalust/seq:latest
    container_name: barbersync-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    restart: unless-stopped
  api:
    build: { context: ., dockerfile: Backend/Presentation/BarberSync.Api/Dockerfile }
    env_file: .env
    ports: ["8080:8080"]
    depends_on: [postgres]
  admin-web:
    build: { context: ., dockerfile: Web/BarberSync.AdminWeb/Dockerfile }
    env_file: .env
    ports: ["8081:8080"]
    depends_on: [api]
  public-web:
    build: { context: ., dockerfile: Web/BarberSync.PublicWeb/Dockerfile }
    env_file: .env
    ports: ["8082:8080"]
    depends_on: [api]
  kiosk-web:
    build: { context: ., dockerfile: Web/BarberSync.KioskWeb/Dockerfile }
    env_file: .env
    ports: ["8083:8080"]
    depends_on: [api]
volumes:
  postgres-data:
  seq-data:
