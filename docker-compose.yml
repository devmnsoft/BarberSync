version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: barbersync
      POSTGRES_USER: barbersync
      POSTGRES_PASSWORD: barbersync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile.Api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  admin:
    build:
      context: ./Backend
      dockerfile: Dockerfile.Admin
    ports:
      - "8081:8081"
    depends_on:
      - api

volumes:
  postgres_data:
